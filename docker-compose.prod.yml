services:
  app:
    image: ghcr.io/fotsuu/ip-healers-academy:latest
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL:-http://academy.facultysys.it.com}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-ethno_capstone}
      - DB_USERNAME=${DB_USERNAME:-ethno_user}
      - DB_PASSWORD=${DB_PASSWORD:-ethno_password}
      # Avoid DB-backed sessions/cache (breaks all web routes if sessions/cache tables are missing)
      - SESSION_DRIVER=file
      - CACHE_STORE=file
      - QUEUE_CONNECTION=sync
      - RUN_MIGRATIONS=true
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=${DB_DATABASE:-ethno_capstone}
      - MYSQL_USER=${DB_USERNAME:-ethno_user}
      - MYSQL_PASSWORD=${DB_PASSWORD:-ethno_password}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-root_password}
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  db_data:
