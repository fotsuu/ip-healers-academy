services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ip-healers-academy-app
    ports:
      - "8000:80"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=ethno_capstone
      - DB_USERNAME=ethno_user
      - DB_PASSWORD=ethno_password
      - RUN_MIGRATIONS=true
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    ports:
      - "33060:3306" # Mapped to 33060 to avoid conflict with host XAMPP MySQL on 3306
    environment:
      - MYSQL_DATABASE=ethno_capstone
      - MYSQL_USER=ethno_user
      - MYSQL_PASSWORD=ethno_password
      - MYSQL_ROOT_PASSWORD=root_password
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    ports:
      - "8080:80"
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=db
    depends_on:
      - db

volumes:
  db_data:
